name: carbide
description: >-
  An unofficial Flutter port of the IBM Carbon Design System, built strictly on
  Flutter's base widgets (no Material, no Cupertino).
version: 0.0.1
homepage: "https://github.com/Bizjak-Tech-OU/carbide"
repository: "https://github.com/Bizjak-Tech-OU/carbide"
issue_tracker: "https://github.com/Bizjak-Tech-OU/carbide/issues"

topics:
  - ui
  - design-system
  - widgets
  - carbon

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.2"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: fonts/IBMPlexSans-Light.ttf
          weight: 300
        - asset: fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
    - family: IBM Plex Mono
      fonts:
        - asset: fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
    - family: IBM Plex Serif
      fonts:
        - asset: fonts/IBMPlexSerif-Light.ttf
          weight: 300
        - asset: fonts/IBMPlexSerif-Regular.ttf
          weight: 400
