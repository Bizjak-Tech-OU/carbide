name: Publish to pub.dev

# Tag-triggered, hands-off publishing to pub.dev using pub.dev's automated
# (OIDC) publishing — no long-lived credentials. The repository is registered
# as a trusted publisher for `carbide` on pub.dev, restricted to the tag
# pattern below.
#
# The actual upload uses pub.dev's official reusable workflow
# (dart-lang/setup-dart/.github/workflows/publish.yml), which sets up the
# Flutter SDK, runs `dart pub publish --dry-run`, then publishes with the OIDC
# token. This is the mechanism pub.dev recommends and can verify; a hand-rolled
# `dart pub publish --force` does not pick up the OIDC credential reliably and
# hangs on the interactive auth prompt.
#
# Release flow (see CONTRIBUTING.md): bump `version` + CHANGELOG.md on master,
# then push a matching `vX.Y.Z` tag.

on:
  push:
    tags:
      # GitHub ref glob: one-or-more digits per segment, plus an optional
      # suffix so pre-release tags (e.g. v0.0.2-rc.1) also publish.
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # Gate (issue #160): the package must pass the same format/analyze/test checks
  # as CI before anything is published. Tag pushes don't trigger ci.yaml.
  verify:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  publish:
    name: Publish to pub.dev
    needs: verify
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev.
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
