name: Deploy gallery

# Builds the Carbide gallery (example/) for the web with WebAssembly and
# publishes it to GitHub Pages. The `--wasm` build ships both a skwasm (WASM)
# and a CanvasKit (JS) renderer; the bootstrapper serves WASM where the browser
# is cross-origin isolated and falls back to CanvasKit otherwise (GitHub Pages
# cannot set the COOP/COEP headers skwasm needs, so most visitors get the
# CanvasKit fallback — the app is identical either way).

on:
  push:
    branches: [master]
    paths:
      - "example/**"
      - "lib/**"
      - "fonts/**"
      - ".github/workflows/deploy-gallery.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a newer one supersede a queued one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build gallery (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Build web (WASM)
        working-directory: example
        run: flutter build web --wasm --base-href /carbide/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
