name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Format, analyze, test
    # Pinned to ubuntu so golden tests render deterministically.
    runs-on: ubuntu-latest
    steps:
      # Documentation submodules are large and not needed to build or test the
      # package, so they are intentionally not checked out here.
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Icon lockfile drift guard
        run: |
          python3 tool/test_icons_lock.py
          python3 tool/check_icons_lock.py

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
