name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Format, analyze, test
    # Pinned to ubuntu so golden tests render deterministically.
    runs-on: ubuntu-latest
    steps:
      # Documentation submodules are large and not needed to build or test the
      # package, so they are intentionally not checked out here.
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Icon lockfile drift guard
        run: |
          python3 tool/test_icons_lock.py
          python3 tool/check_icons_lock.py

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Upstream fidelity (epic W3): the fidelity test renders each Carbide
      # component beside its committed Carbon Storybook reference. Publish the
      # side-by-side images for human review on every PR (the test itself only
      # hard-gates on a non-blank render — see test/fidelity/).
      - name: Upload fidelity comparisons
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carbide-fidelity-comparisons
          path: test/fidelity/comparisons/
          if-no-files-found: warn

  gallery:
    name: Gallery — analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze
        working-directory: example
        run: flutter analyze

      - name: Run tests
        working-directory: example
        run: flutter test

      # Visual review surface (fidelity epic, W2): render every component's
      # preview per theme and assemble per-theme contact-sheet montages. This
      # is an artifact for human eyes, not a pixel gate — it surfaces the kind
      # of rendering defect (clipping, overflow, wrong state) that assertions
      # can't express. The generator itself fails only if the whole catalog
      # stops rendering.
      - name: Generate contact sheet
        working-directory: example
        run: flutter test --dart-define=SCREENSHOTS=true test/contact_sheet_test.dart

      - name: Upload contact sheet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carbide-contact-sheet
          path: example/test/screenshots/
          if-no-files-found: warn
